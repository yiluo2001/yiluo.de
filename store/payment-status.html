<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Status</title>
<link rel="stylesheet" href="main.css">
<script src="logout-login.js"></script>
<script src="config.js"></script>
<style>
    .status-container {
        max-width: 500px;
        width: 100%;
        margin: 20px auto;
        padding: 40px 20px;
        text-align: center;
        border: 1px solid #e0e0e0;
        background-color: #fafafa;
        border-radius: 3px;
        box-sizing: border-box;
    }

    .status-title {
        font-size: 24px;
        font-weight: 700;
        color: #000000;
        margin-bottom: 10px;
    }

    .status-message {
        font-size: 16px;
        color: #666666;
        margin-bottom: 25px;
    }

    .status-btn {
        display: inline-block;
        padding: 10px 20px;
        background-color: #000000;
        color: #ffffff;
        text-decoration: none;
        font-weight: 600;
        border: 1px solid #000000;
        transition: background-color 0.2s ease;
        border-radius: 3px;
    }

    .status-btn:hover {
        background: #444444;
    }
</style>
</head>

<body>
<div class="page-wrapper">
    <div class="paper">
        <!-- part 1 -->
        <header class="paper-header">
            <div class="breadcrumbs">
                <a href="https://www.yiluo.de">Yi Luo</a>
            </div>
            <div style="font-size: 14px; color: #666; display: flex; align-items: center; gap: 10px;">
                <span id="userGreeting"></span>
                <span id="adminDashboard_" style="color: #ccc; display: none;">|</span>
                <a id="adminDashboard" href="admin-products.html" style="color: inherit; text-decoration: none; display: none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">View Admin Dashboard</a> 
            </div>
        </header>

        <!-- part 2 -->
        <div class="paper-top-strip">
            <nav class="main-nav" style="display: flex;">
                <a href="products.html">Products</a>
                <a href="cart.html">Cart</a>
                <a href="orders.html">Orders</a>
                <a href="#" id="authLink" style="margin-left: auto; margin-right: 0;"></a>
            </nav>
        </div>
        
        <!-- part 3 -->
        <main class="paper-content">
            <div id="paymentStatusContent">
                <div class="status-container">
                    <p class="status-message">Processing your payment details...</p>
                </div>
            </div>
        </main>
    </div>
</div>
<script>
    const token = sessionStorage.getItem('jwtToken');
    if (!token) {
        window.location.href = 'login.html';
    }

    document.addEventListener('DOMContentLoaded', () => {
        displayUsername();
        toggleAdminDashboard();
        updateAuthLink();
        handlePaymentStatus();
    });

    function handlePaymentStatus() {
        const urlParams = new URLSearchParams(window.location.search);
        const redirectStatus = urlParams.get('redirect_status');
        const container = document.getElementById('paymentStatusContent');

        if (redirectStatus === 'succeeded') {
            container.innerHTML = `
                <div class="status-container">
                    <h1 class="status-title">Payment Successful</h1>
                    <p class="status-message">Thank you for your order. Your transaction has been completed successfully.</p>
                    <a href="orders.html" class="status-btn">View Your Orders</a>
                </div>
            `;
        } else {
            container.innerHTML = `
                <div class="status-container">
                    <h1 class="status-title">Payment Failed</h1>
                    <p class="status-message">Something went wrong while processing your transaction. Please try again.</p>
                    <a href="cart.html" class="status-btn">Return to Cart</a>
                </div>
            `;
        }
    }
</script>
</body>
</html>
