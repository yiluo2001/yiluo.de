<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store - Admin User Management</title>
    <link rel="stylesheet" href="main.css">
    <script src="admin.js"></script>
    <script src="logout-login.js"></script>
    <script src="config.js"></script>
    <style>
        .user-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
            margin-top: 20px;
        }

        .user-table th, .user-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .user-table th {
            background-color: #e9e9e9;
            font-weight: bold;
            color: #333333;
        }

        .user-table tr:hover {
            background-color: #f5f5f5;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 3px;
            text-transform: uppercase;
        }
        .badge-admin {
            background-color: #222222;
            color: #ffffff;
        }
        .badge-user {
            background-color: #e0e0e0;
            color: #333333;
        }

        .select-role {
            padding: 6px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 3px;
            background: #ffffff;
            cursor: pointer;
        }
        .select-role:focus {
            outline: none;
            border-color: #333333;
        }

        .btn-action {
            padding: 6px 12px;
            background: #222222;
            color: #ffffff;
            border: none;
            border-radius: 3px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-action:hover {
            background: #444444;
        }

        .message-banner {
            margin-bottom: 25px;
            padding: 12px;
            border-radius: 3px;
            display: none;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>

<body>
<div class="page-wrapper">
    <div class="paper">
        <header class="paper-header">
            <div class="breadcrumbs">
                <a href="https://www.yiluo.de">Yi Luo</a>
            </div>
            <!-- <div style="font-size: 14px; color: #666;">Admin Dashboard</div> -->
            <div style="font-size: 14px; color: #666; display: flex; align-items: center; gap: 10px;">
                <span id="userGreeting"></span>
                <span style="color: #ccc;">|</span>
                <a href="products.html" style="color: inherit; text-decoration: none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">View as Customer</a> 
            </div>
        </header>

        <div class="paper-top-strip">
            <nav class="main-nav" style="display: flex;">
                <a href="admin-products.html">Manage Products</a>
                <a href="admin-orders.html">Manage Orders</a>
                <a href="admin-users.html" style="color: #000000;">Manage Users</a>
                <a href="#" onclick="executeLogout()" style="margin-left: auto; margin-right: 0;">Log out</a>
            </nav>
        </div>
        
        <main class="paper-content">
            <h1>User Account Management</h1>
            <p style="color: #666; margin-bottom: 25px;">Review registered system customers, monitor access privileges, and adjust authorization permissions.</p>
            
            <div id="statusMessage" class="message-banner"></div>

            <div style="overflow-x: auto;">
                <table class="user-table">
                    <thead>
                        <tr>
                            <th>User ID</th>
                            <th>Username</th>
                            <th>Current Role</th>
                            <th>Modify Authority</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr>
                            <td colspan="5" style="text-align: center; color: #888;">Loading account directory...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</div>

<script>
    const token = sessionStorage.getItem('jwtToken');
    if (!token) {
        window.location.href = 'login.html';
    }

    document.addEventListener('DOMContentLoaded', () => {
        fetchUsers();
        displayUsername();
    });

    function displayUsername() {
        const username = sessionStorage.getItem('username');
        document.getElementById('userGreeting').textContent = `Hi, ${username}`;
    }

    async function fetchUsers() {
        const tbody = document.getElementById('userTableBody');
        try {
            const response = await fetch(`${BASE_URL}/api/users/manage`, {
                method: 'GET',
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (response.ok) {
                const users = await response.json();
                tbody.innerHTML = '';

                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #888;">No registered accounts found.</td></tr>';
                    return;
                }

                users.forEach(user => {
                    const isAdmin = user.role === 'ROLE_ADMIN' || user.role === 'ADMIN';
                    const badgeClass = isAdmin ? 'badge-admin' : 'badge-user';
                    const displayRole = isAdmin ? 'Admin' : 'User';

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${user.id}</td>
                        <td style="font-weight: bold; color: #111;">${user.username}</td>
                        <td><span class="badge ${badgeClass}">${displayRole}</span></td>
                        <td>
                            <select id="roleSelect-${user.id}" class="select-role">
                                <option value="USER" ${!isAdmin ? 'selected' : ''}>User Privilege</option>
                                <option value="ADMIN" ${isAdmin ? 'selected' : ''}>Admin Privilege</option>
                            </select>
                        </td>
                        <td>
                            <button class="btn-action" onclick="updateUserRole(${user.id})">Update</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #721c24;">Failed to load user records. Ensure administrative privileges.</td></tr>';
            }
        } catch (error) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #721c24;">Connection failure to administration service.</td></tr>';
        }
    }

    async function updateUserRole(userId) {
        const selectedRole = document.getElementById(`roleSelect-${userId}`).value;
        
        try {
            const response = await fetch(`${BASE_URL}/api/users/manage/${userId}/role`, {
                method: 'PUT',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ role: selectedRole })
            });

            if (response.ok) {
                showNotification("Account configuration parameters saved successfully.", "#d4edda", "#155724", "#c3e6cb");
                fetchUsers(); // refresh table asynchronously
            } else {
                showNotification("Server rejected role adjustment command request.", "#f8d7da", "#721c24", "#f5c6cb");
            }
        } catch (error) {
            showNotification("Network communication error executing status persistence handling.", "#f8d7da", "#721c24", "#f5c6cb");
        }
    }
</script>
</body>
</html>
