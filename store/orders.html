<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yi's Store - Orders</title>
<link rel="stylesheet" href="main.css">
<script src="logout-login.js"></script>
<script src="config.js"></script>
<style>
    .orders-container {
        margin-top: 20px;
    }

    .order-card {
        border: 1px solid #e0e0e0;
        border-radius: 4px;
        background: #fafafa;
        margin-bottom: 25px;
        overflow: hidden;
    }

    .order-header {
        background-color: #e9e9e9;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #e0e0e0;
        font-size: 14px;
        flex-wrap: wrap;
        gap: 15px;
    }

    .order-header-meta {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
    }

    .order-id {
        font-weight: bold;
        color: #000000;
    }

    .status-badge {
        padding: 4px 10px;
        border-radius: 3px;
        font-size: 12px;
        font-weight: bold;
        text-transform: uppercase;
        border: 1px solid #333;
    }

    .status-pending { background: #ffffff; color: #222222; border-color: #222222; }
    .status-paid { background: #d4edda; color: #155724; border-color: #c3e6cb; }
    .status-shipped { background: #e2e3e5; color: #383d41; border-color: #d6d8db; }
    .status-completed { background: #222222; color: #ffffff; border-color: #222222; }

    .order-items-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
    }

    .order-items-table th, .order-items-table td {
        padding: 12px 15px;
        text-align: left;
    }

    .order-items-table th {
        color: #666666;
        font-weight: normal;
        border-bottom: 1px solid #e0e0e0;
        font-size: 12px;
        text-transform: uppercase;
    }

    .order-items-table td {
        border-bottom: 1px dashed #e9e9e9;
    }

    .order-items-table tr:last-child td {
        border-bottom: none;
    }

    .error-banner {
        padding: 15px;
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
        border-radius: 3px;
        margin-bottom: 20px;
        text-align: center;
    }

    .table-responsive {
        width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }
</style>
</head>

<body>
<div class="page-wrapper">
    <div class="paper">
        <!-- part 1 -->
        <header class="paper-header">
            <div class="breadcrumbs">
                <a href="products.html">Yi's Store</a>
                <span style="color: #ccc;">|</span>
                <a href="https://www.yiluo.de">Back to Yi's CV</a>
            </div>
            <div style="font-size: 14px; color: #666; display: flex; align-items: center; gap: 10px;">
                <span id="userGreeting"></span>
                <span id="adminDashboard_" style="color: #ccc;">|</span>
                <a id="adminDashboard" href="admin-products.html" style="color: inherit; text-decoration: none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">View Admin Dashboard</a>
            </div>
        </header>

        <!-- part 2 -->
        <div class="paper-top-strip">
            <nav class="main-nav" style="display: flex;">
                <a href="products.html">Products</a>
                <a href="cart.html">Cart</a>
                <a href="orders.html" style="color: #000000;">Orders</a>
                <a href="#" id="authLink" style="margin-left: auto; margin-right: 0;"></a>
            </nav>
        </div>
        
        <!-- part 3 -->
        <main class="paper-content">
            <h1>Your Order History</h1>
            <p style="color: #666; margin-bottom: 25px;">
                Track current fulfilment parameters and inspect complete operational logs below.
            </p>

            <div id="errorDisplay" class="error-banner" style="display: none;"></div>

            <div id="ordersListContainer" class="orders-container">
                <div style="text-align: center; color: #888; padding: 40px 0;">
                    Fetching history vectors from distribution databases...
                </div>
            </div>
        </main>
    </div>
</div>

<script>
    const token = sessionStorage.getItem('jwtToken');
    if (!token) {
        window.location.href = 'login.html';
    }

    document.addEventListener('DOMContentLoaded', () => {
        displayUsername();
        toggleAdminDashboard();
        updateAuthLink();
        
        loadUserOrderHistory();
    });

    async function loadUserOrderHistory() {
        const container = document.getElementById('ordersListContainer');
        const errorDisplay = document.getElementById('errorDisplay');
        
        try {
            const response = await fetch(`${BASE_URL}/api/orders/history`, {
                method: 'GET',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                }
            });

            if (response.ok) {
                const orders = await response.json();
                container.innerHTML = '';

                if (orders.length === 0) {
                    container.innerHTML = `
                        <div style="text-align: center; color: #888; padding: 40px 0;">
                            No logged transaction occurrences discovered for this profile account space.
                        </div>`;
                    return;
                }

                orders.forEach(order => {
                    const orderId = order.id;
                    const rawDate = new Date(order.orderDate);
                    const formattedDate = rawDate.toLocaleDateString() + ' ' + rawDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    const totalAmount = order.totalAmount.toFixed(2);
                    const status = order.status || 'PENDING';
                    const userId = order.user.id;

                    let statusClass = 'status-pending';
                    if (status === 'PAID') statusClass = 'status-paid';
                    if (status === 'SHIPPED') statusClass = 'status-shipped';
                    if (status === 'COMPLETED') statusClass = 'status-completed';

                    const card = document.createElement('div');
                    card.className = 'order-card';

                    let cardHTML = `
                        <div class="order-header">
                            <div class="order-header-meta">
                                <div>
                                    <div style="color: #666; font-size: 11px; text-transform: uppercase;">Order Placed</div>
                                    <div style="font-weight: 500;">${formattedDate}</div>
                                </div>
                                <div>
                                    <div style="color: #666; font-size: 11px; text-transform: uppercase;">Total Cost</div>
                                    <div style="font-weight: bold; color: #000;">€${totalAmount}</div>
                                </div>
                                <div>
                                    <div style="color: #666; font-size: 11px; text-transform: uppercase;">Order ID</div>
                                    <div class="order-id">${orderId}</div>
                                </div>
                                <div>
                                    <div style="color: #666; font-size: 11px; text-transform: uppercase;">User ID</div>
                                    <div class="order-id">${userId}</div>
                                </div>
                            </div>
                            <div>
                                <span class="status-badge ${statusClass}">${status}</span>
                            </div>
                        </div>
                        <div class="table-responsive">
                        <table class="order-items-table">
                            <thead>
                                <tr>
                                    <th style="width: 80px;">Product ID</th>
                                    <th>Product Name</th>
                                    <th style="text-align: center; width: 100px;">Quantity</th>
                                    <th style="text-align: right; width: 150px;">Purchase Value</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;

                    order.orderItems.forEach(item => {
                        const productId = item.id;
                        const productName = item.product ? item.product.name : 'Unknown Product';
                        const quantity = item.quantity;
                        const price = item.priceAtPurchase.toFixed(2);

                        cardHTML += `
                            <tr>
                                <td><strong>${productId}</strong></td>
                                <td><strong>${productName}</strong></td>
                                <td style="text-align: center;">${quantity}</td>
                                <td style="text-align: right; font-weight: 500;">€${price}</td>
                            </tr>
                        `;
                    });

                    cardHTML += `
                            </tbody>
                        </table>
                        </div>
                    `;
                    
                    card.innerHTML = cardHTML;
                    container.appendChild(card);
                });
            } else {
                showError("The system interface encountered an architecture processing failure mapping your records.");
                container.innerHTML = '';
            }
        } catch (error) {
            showError("Network exception capturing profile database log segments.");
            container.innerHTML = '';
        }
    }

    function showError(message) {
        const errorDisplay = document.getElementById('errorDisplay');
        errorDisplay.textContent = message;
        errorDisplay.style.display = 'block';
    }
</script>
</body>
</html>
