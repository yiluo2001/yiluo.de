<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yi's Store - Products</title>
    <link rel="stylesheet" href="main.css">
    <script src="logout-login.js"></script>
    <script src="config.js"></script>
    <style>
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }

        .product-card {
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 15px;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: border-color 0.2s;
        }

        .product-card:hover {
            border-color: #333333;
        }

        .product-info h3 {
            margin: 0 0 8px 0;
            font-size: 18px;
            color: #111111;
        }

        .product-info p {
            margin: 0 0 15px 0;
            font-size: 14px;
            color: #666666;
            line-height: 1.4;
        }

        .product-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
        }

        .product-price {
            font-size: 16px;
            font-weight: bold;
            color: #000000;
        }

        .btn-add-cart {
            padding: 8px 12px;
            background: #222222;
            color: #ffffff;
            border: none;
            border-radius: 3px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-add-cart:hover {
            background: #444444;
        }

        .btn-add-cart:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }

        .message-banner {
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 3px;
            display: none;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>

<body>
<div class="page-wrapper">
    <div class="paper">
        <header class="paper-header">
            <div class="breadcrumbs">
                <a href="https://www.yiluo.de">Yi Luo</a>
                <!-- <a href="products.html">Yi's Store</a>
                <span style="color: #ccc;">|</span>
                <a href="https://www.yiluo.de">Back to Yi's CV</a> -->
            </div>
            <div style="font-size: 14px; color: #666; display: flex; align-items: center; gap: 10px;">
                <span id="userGreeting"></span>
                <span id="adminDashboard_" style="color: #ccc; display: none;">|</span>
                <a id="adminDashboard" href="admin-products.html" style="color: inherit; text-decoration: none; display: none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">View Admin Dashboard</a> 
            </div>
        </header>

        <div class="paper-top-strip">
            <nav class="main-nav" style="display: flex;">
                <a href="products.html" style="color: #000000;">Products</a>
                <a href="cart.html">Cart</a>
                <a href="orders.html">Orders</a>
                <a href="#" id="authLink" style="margin-left: auto; margin-right: 0;"></a>
            </nav>
        </div>
        
        <main class="paper-content">
            <h1 style="margin-bottom: 10px;">Our Products</h1>
            <p style="color: #666; margin-bottom: 25px;">Browse our curated collection of high-quality essentials.</p>
            
            <div id="statusMessage" class="message-banner"></div>

            <div id="productCatalog" class="product-grid">
                <div style="text-align: center; grid-column: 1 / -1; color: #888; padding: 40px 0;">
                    Loading items from catalog...
                </div>
            </div>
        </main>
    </div>
</div>

<script>
    const token = sessionStorage.getItem('jwtToken');

    document.addEventListener('DOMContentLoaded', () => {
        loadCatalog();
        displayUsername();
        toggleAdminDashboard();
        updateAuthLink();
    });

    async function loadCatalog() {
        const catalogContainer = document.getElementById('productCatalog');
        
        try {
            const response = await fetch(`${BASE_URL}/api/products`, {
                method: 'GET'
            });

            if (response.ok) {
                const products = await response.json();
                catalogContainer.innerHTML = '';

                if (products.length === 0) {
                    catalogContainer.innerHTML = `
                        <div style="text-align: center; grid-column: 1 / -1; color: #888; padding: 40px 0;">
                            No items are currently listed in the store repository.
                        </div>`;
                    return;
                }

                products.forEach(product => {
                    const isOutOfStock = product.stock <= 0;
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    
                    card.innerHTML = `
                        <div class="product-info">
                            <h3>${product.name}</h3>
                            <p>${product.description || 'No description provided.'}</p>
                        </div>
                        <div class="product-meta">
                            <span class="product-price">€${product.price.toFixed(2)}</span>
                            <button class="btn-add-cart" 
                                    onclick="addToCart(${product.id})" 
                                    ${isOutOfStock ? 'disabled' : ''}>
                                ${isOutOfStock ? 'Out of Stock' : 'Add to Cart'}
                            </button>
                        </div>
                    `;
                    catalogContainer.appendChild(card);
                });
            } else {
                catalogContainer.innerHTML = `<div style="text-align: center; grid-column: 1 / -1; color: #a31313; padding: 40px 0;">Failed to fetch catalog arrays from backend server.</div>`;
            }
        } catch (error) {
            catalogContainer.innerHTML = `<div style="text-align: center; grid-column: 1 / -1; color: #a31313; padding: 40px 0;">Network communication failure connecting to infrastructure core.</div>`;
        }
    }

    async function addToCart(productId) {
        if (!token) {
            showNotification("Please sign in to add items to your shopping cart.", "#f8d7da", "#721c24", "#f5c6cb");
            setTimeout(() => { window.location.href = 'login.html'; }, 1500);
            return;
        }

        try {
            const response = await fetch(`${BASE_URL}/api/cart/add?productId=${productId}&quantity=1`, {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token
                },
            });

            if (response.ok) {
                showNotification("Item added to your shopping cart successfully!", "#d4edda", "#155724", "#c3e6cb");
            } else {
                showNotification("Failed to append item to remote checkout instance.", "#f8d7da", "#721c24", "#f5c6cb");
            }
        } catch (error) {
            showNotification("Network timeout context processing item add sequence.", "#f8d7da", "#721c24", "#f5c6cb");
        }
    }

    function showNotification(text, bg, color, border) {
        const banner = document.getElementById('statusMessage');
        banner.textContent = text;
        banner.style.backgroundColor = bg;
        banner.style.color = color;
        banner.style.border = `1px solid ${border}`;
        banner.style.display = 'block';
        
        setTimeout(() => { banner.style.display = 'none'; }, 1500);
    }

    function executeLogout() {
        sessionStorage.removeItem('jwtToken');
        sessionStorage.removeItem('role');
        sessionStorage.removeItem('username');
        window.location.reload();
    }
</script>
</body>
</html>
