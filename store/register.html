<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Store - Register</title>
<link rel="stylesheet" href="main.css">
<link rel="stylesheet" href="auth.css">
<script src="config.js"></script>
</head>

<body>
<div class="page-wrapper">
    <div class="paper">
        <header class="paper-header">
            <div class="breadcrumbs">
                <a href="products.html">Yi's Store</a>
                <span style="color: #ccc;">|</span>
                <a href="www.yiluo.de">Back to Yi's CV</a>
            </div>
        </header>

        <div class="paper-top-strip">
            <nav class="main-nav" style="display: flex;">
                <a href="products.html">Products</a>
                <a href="cart.html">Cart</a>
                <a href="orders.html">Orders</a>
                <a href="login.html" style="margin-left: auto; margin-right: 0;">Log in</a>
            </nav>
        </div>
        
        <main class="paper-content">
            <div class="auth-container">
                <h1 style="font-size: 26px; text-align: center; margin-bottom: 25px;">Create Account</h1>
                
                <div id="feedbackMessage" class="message"></div>

                <form id="registerForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="Choose a username" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Create a password" required>
                    </div>
                    
                    <button type="submit" class="btn-submit">Register</button>
                </form>
                
                <div class="auth-switch">
                    Already have an account? <a href="login.html">Log in here</a>
                </div>
            </div>
        </main>
    </div>
</div>

<script>
    // see await for async comment
    // event is an obj created automatically by browser, it contains event info
    document.getElementById('registerForm').addEventListener('submit', async function(event) {
        // prevent the standard browser form submit behavior
        event.preventDefault();

        const usernameInput = document.getElementById('username').value;
        const passwordInput = document.getElementById('password').value;
        const feedbackBox = document.getElementById('feedbackMessage');

        // hide any existing messages
        feedbackBox.style.display = 'none';
        // to convert class 'message success' or 'message error' back to 'message'
        feedbackBox.className = 'message';

        // prepare the js obj that matches Java User class
        const registrationData = {
            username: usernameInput,
            password: passwordInput
        };

        try {
            // fetch gives promise obj instantly
            // but we need the real stuff (real response from server)
            // await means do not do next step unless the server sends back the real stuff
            // but get real server response can take long time
            // that is why we need asyns in beginning
            // so we can do things other than the function itself
            // while the function run in back ground
            const response = await fetch(`${BASE_URL}/api/users/register`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                // JSON.stringify() turn js obj into json
                body: JSON.stringify(registrationData)
            });

            if (response.ok) {
                // Display success message to the customer
                feedbackBox.textContent = "Registration successful! Redirecting to login...";
                feedbackBox.classList.add('success');
                feedbackBox.style.display = 'block';

                // wait 2000 ms, then move to new login page automacially
                // window.location is current url obj
                setTimeout(() => {window.location.href = 'login.html';}, 2000);

            } else {
                // register info sent to server succesfully
                // but server send back error
                feedbackBox.textContent = "Registration failed. Username might already be taken.";
                feedbackBox.classList.add('error');
                feedbackBox.style.display = 'block';
            }
        } catch (error) {
            // register info not sent to server
            feedbackBox.textContent = "Unable to connect to the server. Please try again later.";
            feedbackBox.classList.add('error');
            feedbackBox.style.display = 'block';
            // display error info on console
            console.error('Error:', error);
        }
    });
</script>
</body>
</html>
